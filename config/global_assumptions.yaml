# =============================================================================
# Global Assumptions
# =============================================================================
#
# These parameters apply to ALL scenarios and cannot be overridden.
# They represent methodological choices and fixed economic parameters.
#
# =============================================================================

# -----------------------------------------------------------------------------
# Dollar Year Adjustment
# -----------------------------------------------------------------------------

# Inflation factor to convert 2024 dollars to 2025 dollars
# Applied to per-household cost outputs in distribution calculation
inflation_2024_to_2025: 0.027

# -----------------------------------------------------------------------------
# BEA I-O Table Level
# -----------------------------------------------------------------------------

# Which BEA input-output tables to use for the I-O price model:
#   'summary'  = 73 commodities, 2024 annual data (default)
#   'detail'   = ~400 commodities, 2017 benchmark data
bea_io_level: 'detail'

# -----------------------------------------------------------------------------
# Price Effect Parameters
# -----------------------------------------------------------------------------

# USD offset for exchange rate response
# Calculated as: exchange_rate_response (0.3) * import_content (0.58)
usd_offset: 0.174

# Domestic pricing effect: fraction of tariff-induced cost increases
# passed through to prices of domestically produced competing goods
domestic_pricing: 0.5

# -----------------------------------------------------------------------------
# Revenue Parameters
# -----------------------------------------------------------------------------

# Compliance effect: reduction in collections due to noncompliance/evasion.
#
# This now doubles as the FLAT FALLBACK for the eta' noncompliance factor: when a
# scenario provides no granular eta' file (model_params noncompliance.eta_file),
# eta' = (1 - compliance_effect) is applied to every (gtap, region) cell. The
# haircut is applied to the tariff itself — producing rate (b) that drives the
# GTAP shock, the USMM impulse, and the post-substitution prices (see
# src/00a_prepare_rate_inputs.R) — NOT as a separate revenue adjustment. Revenue's
# old gross-revenue compliance multiplier is therefore dropped whenever
# noncompliance is active (rate-panel scenarios). Set to 0 to disable the haircut
# entirely (eta' = 1, b == a) for before/after comparison runs.
compliance_effect: 0.10

# Income and payroll tax offset: reduction from lower taxable income due to tariff burden
# Applied as negative adjustment to gross revenue
income_effect: 0.23

# -----------------------------------------------------------------------------
# Phase-in Schedule
# -----------------------------------------------------------------------------

# Fraction of tariff effects phased in by fiscal year
# All fiscal years used by the model must be listed
phase_in:
  2025: 0.33
  2026: 0.66
  2027: 1.00
  2028: 1.00
  2029: 1.00
  2030: 1.00
  2031: 1.00
  2032: 1.00
  2033: 1.00
  2034: 1.00
  2035: 1.00


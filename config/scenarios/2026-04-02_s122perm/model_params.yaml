# =============================================================================
# Model Parameters: 2026-04-02_s122perm
# =============================================================================
# Section 122 permanent (Congress extends)

# -----------------------------------------------------------------------------
# Tariff-ETRs Configuration
# -----------------------------------------------------------------------------

# Scenario name in Tariff-ETRs/config/scenarios/ (ETRs owns all tariff policy configs)
tariff_etrs:
  scenario: '2026-04-02_s122perm'
  baseline: 'baseline'

# -----------------------------------------------------------------------------
# GTAP Configuration
# -----------------------------------------------------------------------------

gtap:
  include_retaliation: true

# -----------------------------------------------------------------------------
# Time-Varying ETR Configuration
# -----------------------------------------------------------------------------

# Reference date for GTAP single-run (uses this date's shocks)
gtap_reference_date: '2026-02-20'

# -----------------------------------------------------------------------------
# USMM Configuration
# -----------------------------------------------------------------------------

# Subset of ETR dates to use for USMM decomposition. Keeps the number of
# macro shock components small rather than using all ~38 ETR dates.
usmm_dates:
  - '2026-01-01'
  - '2026-02-20'

# -----------------------------------------------------------------------------
# Refund Parameters
# -----------------------------------------------------------------------------

refund_2026: 168.0

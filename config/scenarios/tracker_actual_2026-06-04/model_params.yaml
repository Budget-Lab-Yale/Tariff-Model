# =============================================================================
# Model Parameters: tracker_actual_2026-06-04
# =============================================================================
# Smoke test for the tariff-rate-tracker handoff. Uses the current-law actual
# panel as the scenario path and compares each interval to the 2025-01-01 actual
# slice as the fixed baseline.

rate_panel:
  root: 'C:/Users/jar335/Documents/Interfaces/model_data/tariff-rate-tracker'
  vintage: '2026-06-04_2'
  tracker_scenario: 'actual'
  baseline_date: '2025-01-01'
  interval_end: 'inclusive'
  snapshot_dates:
    - '2025-01-01'
    - '2026-02-24'
    - '2026-04-06'
    - '2026-05-28'

gtap:
  include_retaliation: false

# eta' noncompliance schedule, now produced IN-REPO by the calibration harness.
# Per-(GTAP product x partner group) wedge eta; the model consumes 1 - eta.
# This smoke test reuses the canonical 06-13-vintage TM eta (the same numbers it
# previously drew from tariff-etr-adj). Drives the eta'-adjusted (b) rate fed to
# GTAP, prices, USMM, and revenue.
noncompliance:
  eta_file: 'output/calibration/tracker_actual_2026-06-13/eta_by_partner_gtap.csv'

# alpha substitution-correction. Consumed ONLY by the revenue alpha->GTAP
# transition (04_calculate_revenue.R); structural model stays full GTAP. Reuses
# the canonical 06-13-vintage alpha params (within~0.66, between~0.29 PROVISIONAL).
substitution:
  alpha_file: 'output/calibration/tracker_actual_2026-06-13/alpha/alpha_parameters.csv'
  commodity_passthrough_file: 'resources/calibration/gtap_commodity_sectors.csv'

# Calibration-harness window (src/calibration). period_avg spans the calibration
# window (Jun 2025 - Feb 2026); 2026-03 is the held-out month, included as its own
# monthly period but kept OUT of period_avg so the average is not contaminated.
calibration:
  window_start: '2025-06'
  window_end: '2026-02'
  months:
    - '2025-06'
    - '2025-07'
    - '2025-08'
    - '2025-09'
    - '2025-10'
    - '2025-11'
    - '2025-12'
    - '2026-01'
    - '2026-02'
    - '2026-03'

# Latest interval start in this bundle.
gtap_reference_date: '2026-05-28'

# Keep the macro decomposition compact if this scenario is run end-to-end.
usmm_dates:
  - '2025-01-01'
  - '2026-02-24'
  - '2026-04-06'
  - '2026-05-28'

temp_component_dates:
  - '2026-02-24'
  - '2026-05-28'

refund_2026: 166.0

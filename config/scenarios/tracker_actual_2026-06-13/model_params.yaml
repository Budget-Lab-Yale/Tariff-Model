# =============================================================================
# Model Parameters: tracker_actual_2026-06-13
# =============================================================================
# Calibration-harness scenario on the 2026-06-13 tracker rate vintage (28 rate
# revisions in the Jun 2025 - Mar 2026 window). For src/calibration only -- not
# the production pipeline.

rate_panel:
  root: 'C:/Users/jar335/Documents/Interfaces/model_data/tariff-rate-tracker'
  vintage: 'latest_2026_06_13'  tracker_scenario: 'actual'
  baseline_date: '2025-01-01'
  interval_end: 'inclusive'

# Latest interval start in this bundle.
gtap_reference_date: '2026-11-10'

gtap:
  include_retaliation: false

# eta' noncompliance schedule, now produced IN-REPO by the calibration harness
# (calibrate.R --stage eta; reproduces the upstream tariff-etr-adj golden
# bit-for-bit — see tests/fixtures/eta_golden/). Model consumes 1 - eta.
# NOTE: a calibration output (/output/ is gitignored) — on a fresh checkout run
# `Rscript calibrate.R tracker_actual_2026-06-13 --stage panel` then `--stage eta`
# before this scenario resolves.
noncompliance:
  eta_file: 'output/calibration/tracker_actual_2026-06-13/eta_by_partner_gtap.csv'

# alpha substitution-correction (calibrate.R --stage alpha). Consumed ONLY by the
# revenue alpha->GTAP transition (04_calculate_revenue.R); the structural model
# (post-sub ETR, prices, cost/distribution, USMM) stays full GTAP. Both channels
# ship (within~0.66, between~0.29 PROVISIONAL). The near-term revenue ETR anchors
# on the alpha-corrected value and converges linearly to full GTAP over 5 fiscal
# years from alpha_transition.anchor_fy (default 2026).
substitution:
  alpha_file: 'output/calibration/tracker_actual_2026-06-13/alpha/alpha_parameters.csv'
  commodity_passthrough_file: 'resources/calibration/gtap_commodity_sectors.csv'

# Calibration window. period_avg spans Jun 2025 - Feb 2026; 2026-03 is the held-out
# month, included as its own monthly period but kept OUT of period_avg.
calibration:
  window_start: '2025-06'
  window_end: '2026-02'
  months:
    - '2025-06'
    - '2025-07'
    - '2025-08'
    - '2025-09'
    - '2025-10'
    - '2025-11'
    - '2025-12'
    - '2026-01'
    - '2026-02'
    - '2026-03'

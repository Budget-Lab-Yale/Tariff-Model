# =============================================================================
# Model Parameters: tracker_actual_2026-07-21
# =============================================================================
# Actual/current-law path against the 2026-07-21-08 tracker vintage, which folds
# in the late-July tariff announcements. Successor to tracker_actual_2026-07-01
# (last pinned at 2026-07-16-09). The new announcements are forward-looking only
# (added snapshots valid_from 2026-07-22 / 2026-08-19). eta/alpha are REFIT against
# this basket (model_data/Tariff-Model/calibration/tracker_actual_2026-07-21/).
# Because the calibration window (2025-06..2026-03) and the import weights are
# unchanged, the refit is expected to reproduce the prior calibration up to
# numerical noise; it is run to give this vintage a real, traceable calibration.

rate_panel:
  vintage: '2026-07-21-08'
  tracker_scenario: 'actual'
  baseline_date: '2025-01-01'
  interval_end: 'inclusive'

# End-2026 policy state, matching the prior tracker reference convention.
gtap_reference_date: '2026-11-10'

gtap:
  include_retaliation: false

refund_2026: 166.0

noncompliance:
  eta_file: 'tracker_actual_2026-07-21/eta_by_partner_gtap.csv'

substitution:
  alpha_file: 'tracker_actual_2026-07-21/alpha/alpha_parameters.csv'
  commodity_passthrough_file: 'resources/calibration/gtap_commodity_sectors.csv'

calibration:
  window_start: '2025-06'
  window_end: '2026-02'
  months:
    - '2025-06'
    - '2025-07'
    - '2025-08'
    - '2025-09'
    - '2025-10'
    - '2025-11'
    - '2025-12'
    - '2026-01'
    - '2026-02'
    - '2026-03'

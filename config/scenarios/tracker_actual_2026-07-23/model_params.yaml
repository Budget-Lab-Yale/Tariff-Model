# =============================================================================
# Model Parameters: tracker_actual_2026-07-23
# =============================================================================
# Actual/current-law path against the 2026-07-23-21 tracker vintage (branch
# claude-301), which introduces the forced-labor Section 301 scenario family.
# Successor to tracker_actual_2026-07-21 (2026-07-21-08). Standard calibration:
# eta/alpha are refit against this basket over the shipped window (train
# 2025-06..2026-02, held-out test 2026-03), with the real Treasury level.
# The recency-weighted sibling is tracker_actual_2026-07-23_recency.

rate_panel:
  vintage: '2026-07-23-21'
  tracker_scenario: 'actual'
  baseline_date: '2025-01-01'
  interval_end: 'inclusive'

# End-2026 policy state, matching the prior tracker reference convention.
gtap_reference_date: '2026-11-10'

gtap:
  include_retaliation: false

refund_2026: 166.0

noncompliance:
  eta_file: 'tracker_actual_2026-07-23/eta_by_partner_gtap.csv'

substitution:
  alpha_file: 'tracker_actual_2026-07-23/alpha/alpha_parameters.csv'
  commodity_passthrough_file: 'resources/calibration/gtap_commodity_sectors.csv'

calibration:
  window_start: '2025-06'
  window_end: '2026-02'
  months:
    - '2025-06'
    - '2025-07'
    - '2025-08'
    - '2025-09'
    - '2025-10'
    - '2025-11'
    - '2025-12'
    - '2026-01'
    - '2026-02'
    - '2026-03'
